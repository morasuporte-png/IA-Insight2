name: AI Insights Content Automation

on:
  workflow_dispatch:
  schedule:
    # 06:00 America/Sao_Paulo = 09:00 UTC.
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  refresh-content:
    runs-on: ubuntu-latest
    concurrency:
      group: ai-insights-content-refresh
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Research new AI sources
        run: node scripts/research-intake.mjs --limit=2

      - name: Review, approve and publish content
        run: node scripts/editor-chief-review.mjs --publish --publish-max=2

      - name: Commit automated content updates
        run: |
          git config user.name "AI Insights Automation"
          git config user.email "actions@github.com"
          git add content.json research/*.json index.html sitemap.xml robots.txt artigos assets scripts/update-content.mjs
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "Automated AI content refresh"
            git push
          fi
