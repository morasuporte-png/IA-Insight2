<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Insights | Revisão de Rascunhos</title>
  <style>
    :root { color-scheme: dark; --bg:#06080f; --panel:#101827; --line:rgba(148,163,184,.2); --text:#f8fafc; --soft:#cbd5e1; --muted:#94a3b8; --cyan:#22d3ee; --blue:#3b82f6; --violet:#8b5cf6; }
    * { box-sizing: border-box; }
    body { margin:0; background: radial-gradient(circle at 80% 0, rgba(34,211,238,.14), transparent 28%), var(--bg); color:var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width:min(1180px, calc(100% - 32px)); margin:0 auto; padding:40px 0 64px; }
    header { display:flex; justify-content:space-between; gap:24px; align-items:flex-start; margin-bottom:28px; }
    h1 { margin:0 0 10px; font-size:clamp(34px, 5vw, 58px); line-height:1; }
    p { color:var(--soft); line-height:1.6; }
    .meta { display:flex; flex-wrap:wrap; gap:10px; margin:18px 0 0; }
    .pill { border:1px solid var(--line); border-radius:999px; padding:8px 12px; color:#7dd3fc; background:rgba(59,130,246,.12); font-size:13px; font-weight:800; }
    .actions { display:grid; gap:10px; min-width:min(360px,100%); }
    code, pre { font-family:"SFMono-Regular", Consolas, monospace; }
    pre { margin:0; white-space:pre-wrap; border:1px solid var(--line); border-radius:8px; padding:14px; color:var(--soft); background:rgba(15,23,42,.72); }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:16px; }
    article { border:1px solid var(--line); border-radius:8px; padding:18px; background:rgba(16,24,39,.78); box-shadow:0 18px 42px rgba(0,0,0,.18); }
    article h2 { margin:10px 0 8px; font-size:22px; line-height:1.15; }
    article p { margin:0 0 14px; font-size:14px; }
    .row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between; }
    .tag { color:#7dd3fc; font-size:12px; font-weight:850; text-transform:uppercase; }
    a { color:#7dd3fc; text-decoration:none; font-weight:800; }
    .command { margin-top:14px; border-top:1px solid var(--line); padding-top:14px; color:var(--muted); font-size:12px; }
    .empty { border:1px dashed var(--line); border-radius:8px; padding:24px; color:var(--soft); }
    @media (max-width: 820px) { header { display:block; } .actions { margin-top:20px; } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <section>
        <span class="pill">Fila editorial</span>
        <h1>Rascunhos de pesquisa</h1>
        <p>Conteúdos coletados automaticamente. Revise título, fonte, resumo e relevância antes de aprovar/publicar.</p>
        <div class="meta" id="meta"></div>
      </section>
      <aside class="actions">
        <pre>node scripts/research-intake.mjs --limit=2</pre>
        <pre>node scripts/approve-drafts.mjs ID_DO_RASCUNHO</pre>
        <pre>node scripts/publish-approved.mjs --max=6</pre>
      </aside>
    </header>
    <section class="grid" id="drafts"></section>
  </main>
  <script>
    const meta = document.querySelector('#meta');
    const drafts = document.querySelector('#drafts');

    function esc(value = '') {
      return String(value).replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    }

    async function loadDrafts() {
      try {
        const response = await fetch('research/drafts.json?ts=' + Date.now());
        const data = await response.json();
        const items = data.items || [];
        const draftItems = items.filter((item) => item.status === 'draft');
        meta.innerHTML = `
          <span class="pill">${draftItems.length} rascunhos pendentes</span>
          <span class="pill">${data.summary?.sourcesChecked || 0} fontes checadas</span>
          <span class="pill">${data.summary?.failures?.length || 0} falhas</span>
        `;
        if (!draftItems.length) {
          drafts.innerHTML = '<div class="empty">Nenhum rascunho pendente agora.</div>';
          return;
        }
        drafts.innerHTML = draftItems.map((item) => `
          <article>
            <div class="row"><span class="tag">${esc(item.category)} · ${esc(item.sourceLabel)}</span><span class="tag">${esc(item.readingTime)}</span></div>
            <h2>${esc(item.title)}</h2>
            <p>${esc(item.excerpt)}</p>
            <p>${esc(item.reviewNotes)}</p>
            <a href="${esc(item.sourceUrl)}" target="_blank" rel="noreferrer">Abrir fonte</a>
            <div class="command">Aprovar: <code>node scripts/approve-drafts.mjs ${esc(item.id)}</code></div>
          </article>
        `).join('');
      } catch (error) {
        drafts.innerHTML = `<div class="empty">Nao consegui carregar <code>research/drafts.json</code>. Abra via servidor local para usar esta tela.</div>`;
      }
    }

    loadDrafts();
  </script>
</body>
</html>
